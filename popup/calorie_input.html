<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="calorie_input.css" />
    <link rel="icon" type="image/x-icon" href="/icons/pie-chart-32.png" />
    <title>Weekly Calorie Tracker</title>
  </head>
  <body>
    <div class="popup-content">
      <div class="tab-container">
        <h1>Weekly Calorie Tracker</h1>
        <ul class="tabs">
          <li><a href="#overview" class="active">Overview</a></li>
          <li><a href="#last-entries">View entries</a></li>
        </ul>
      </div>
      <div class="tab-panels">
        <div id="overview" class="tab-content">
          <form>
            <div class="input-row">
              <label for="calorie-input">Today's calories:</label>
              <input
                type="number"
                name="calorie-input"
                id="calorie-input"
                step="1"
                min="1"
                max="20000"
                placeholder="E.g. 1650"
                required
              />
            </div>
            <button type="submit" id="save-btn">Save</button>
          </form>

          <section id="average-content">
            <h2>Week for dates:</h2>
            <p class="date-range"></p>
            <dl class="calorie-data">
              <div class="calorie-row" id="weeklyOverUnder">
                <dt>Calories over / under weekly goal:</dt>
                <dd id="weekly-calories">0</dd>
              </div>
              <div class="calorie-row" id="dailyAverage">
                <dt>Daily average:</dt>
                <dd>0</dd>
              </div>
              <div class="calorie-row">
                <dt>Daily goal:</dt>
                <dd id="daily-goal">1,700</dd>
              </div>
            </dl>
          </section>
        </div>

        <div id="last-entries" class="tab-content active-panel">
          <section id="daily-entries">
            <table>
              <thead>
                <tr>
                  <th>Date</th>
                  <th>Calories</th>
                  <th></th>
                </tr>
              </thead>
              <tbody>
                <tr class="table-rows">
                  <td>14/05/2026</td>
                  <td class="calories">1,693</td>
                  <td class="actions-menu">
                    <button class="more-options-btn">
                      <svg
                        xmlns="http://www.w3.org/2000/svg"
                        height="24px"
                        viewBox="0 -960 960 960"
                        width="24px"
                        fill="#1f1f1f"
                      >
                        <path
                          d="M480-160q-33 0-56.5-23.5T400-240q0-33 23.5-56.5T480-320q33 0 56.5 23.5T560-240q0 33-23.5 56.5T480-160Zm0-240q-33 0-56.5-23.5T400-480q0-33 23.5-56.5T480-560q33 0 56.5 23.5T560-480q0 33-23.5 56.5T480-400Zm0-240q-33 0-56.5-23.5T400-720q0-33 23.5-56.5T480-800q33 0 56.5 23.5T560-720q0 33-23.5 56.5T480-640Z"
                        />
                      </svg>
                    </button>

                    <div class="inner-menu">
                      <button class="options">
                        <svg
                          xmlns="http://www.w3.org/2000/svg"
                          height="24px"
                          viewBox="0 -960 960 960"
                          width="24px"
                          fill="#1f1f1f"
                        >
                          <path
                            d="M200-120q-33 0-56.5-23.5T120-200v-560q0-33 23.5-56.5T200-840h357l-80 80H200v560h560v-278l80-80v358q0 33-23.5 56.5T760-120H200Zm280-360ZM360-360v-170l367-367q12-12 27-18t30-6q16 0 30.5 6t26.5 18l56 57q11 12 17 26.5t6 29.5q0 15-5.5 29.5T897-728L530-360H360Zm481-424-56-56 56 56ZM440-440h56l232-232-28-28-29-28-231 231v57Zm260-260-29-28 29 28 28 28-28-28Z"
                          />
                        </svg>
                        <span>Edit</span>
                      </button>
                      <button class="options">
                        <svg
                          xmlns="http://www.w3.org/2000/svg"
                          height="24px"
                          viewBox="0 -960 960 960"
                          width="24px"
                          fill="#1f1f1f"
                        >
                          <path
                            d="M280-120q-33 0-56.5-23.5T200-200v-520h-40v-80h200v-40h240v40h200v80h-40v520q0 33-23.5 56.5T680-120H280Zm400-600H280v520h400v-520ZM360-280h80v-360h-80v360Zm160 0h80v-360h-80v360ZM280-720v520-520Z"
                          />
                        </svg>
                        <span>Delete</span>
                      </button>
                    </div>
                  </td>
                </tr>
              </tbody>
            </table>
          </section>
        </div>
      </div>
    </div>
    <script src="calorie_input.js"></script>
  </body>
</html>
